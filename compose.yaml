services:

  backend:
    image: prasannadil/user_managment_system-backend:1.1
    container_name: backend
    restart: always
    expose:
      - "8080"

  frontend:
    image: prasannadil/user_managment_system-frontend:v1.6
    container_name: frontend
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always