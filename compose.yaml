

services:

  backend:
    build: ./backend/user_managment_system
    container_name: backend
    expose:
      - "8080"
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    expose:
      - "80"
    restart: always

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend